const UNIT_LABELS = {
  1:'Getting Started', 2:'Python Fundamentals', 3:'Control Flow',
  4:'NumPy Arrays', 5:'Pandas Basics', 6:'Data Cleaning',
  7:'Data Analysis', 8:'Data Visualization', 9:'ML, SQL & APIs',
  10:'Git & Portfolio'
};

const input   = document.getElementById('search-input');
const results = document.getElementById('search-results');
const hint    = document.getElementById('search-hint');

function search(q) {
  q = q.trim().toLowerCase();
  if (!q) {
    results.innerHTML = '';
    hint.textContent = '100 lessons across 10 units';
    return;
  }
  const matches = SEARCH_INDEX.filter(l =>
    l.title.toLowerCase().includes(q) ||
    UNIT_LABELS[l.unit].toLowerCase().includes(q)
  );
  hint.textContent = matches.length
    ? `${matches.length} result${matches.length > 1 ? 's' : ''} for "${q}"`
    : `No results for "${q}"`;

  if (!matches.length) {
    results.innerHTML = `<p class="search-empty">Try a different keyword — e.g. "pandas", "loop", "plot".</p>`;
    return;
  }

  // Group by unit
  const grouped = {};
  matches.forEach(l => {
    if (!grouped[l.unit]) grouped[l.unit] = [];
    grouped[l.unit].push(l);
  });

  results.innerHTML = Object.entries(grouped).map(([unit, lessons]) => `
    <div class="search-group">
      <div class="search-group-header">Unit ${unit} — ${UNIT_LABELS[unit]}</div>
      ${lessons.map(l => {
        const done = isDone(parseInt(unit), l.idx);
        const highlighted = l.title.replace(
          new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
          '<mark>$1</mark>'
        );
        return `<a class="search-result-item${done ? ' done-lesson' : ''}" href="${l.url}#lesson-${l.idx}">
          <span class="lesson-check${done ? ' done' : ''}">${done ? '✓' : ''}</span>
          <span class="search-result-title">${highlighted}</span>
          <span class="search-result-arrow">→</span>
        </a>`;
      }).join('')}
    </div>
  `).join('');
}

input.addEventListener('input', () => search(input.value));
